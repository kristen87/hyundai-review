name: 현대카드 앱 주간 리뷰 수집

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 00:00 UTC = 09:00 KST
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests beautifulsoup4

      - name: 리뷰 수집 및 리포트 생성
        env:
          CI: "true"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python collector.py

      - name: Git 설정 및 새 리포트 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ index.html
          git diff --cached --quiet || git commit -m "리포트 자동 업데이트 $(date '+%Y-%m-%d')"
          git push

      - name: 배포 폴더 구성
        run: |
          mkdir -p deploy
          cp reports/manifest.json deploy/
          cp reports/*.html deploy/
          cp index.html deploy/index.html

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v4

      - name: 배포 파일 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
